<header id="site-navbar" class="fixed-top">
    <nav class="navbar navbar-expand-lg glass-navbar">
        <div class="container py-2 py-lg-3">
            <a class="navbar-brand brand-mark" href="{% url 'home-index' %}">NunziaPia Coaching</a>

            <button class="navbar-toggler nav-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-4 mt-3 mt-lg-0">
                    <li class="nav-item"><a href="{% url 'home-index' %}" data-nav-target="home" class="nav-link nav-link-ux {% if request.path == '/' %}is-active{% endif %}">Home</a></li>
                    <li class="nav-item"><a href="{% url 'home-index' %}#metodo" data-nav-target="metodo" class="nav-link nav-link-ux">Metodo</a></li>
                    <li class="nav-item"><a href="{% url 'home-index' %}#test" data-nav-target="test" class="nav-link nav-link-ux">Test</a></li>
                    <li class="nav-item"><a href="{% url 'home-index' %}#testimonials" data-nav-target="testimonials" class="nav-link nav-link-ux">Testimonianze</a></li>
                    {% if request.user.is_authenticated %}
                        <li class="nav-item"><a href="{% url 'accounts:profile' %}" class="nav-link nav-link-ux">Profilo</a></li>
                        {% if request.user.is_superuser %}
                            <li class="nav-item"><a href="{% url 'accounts:admin-dashboard' %}" class="nav-link nav-link-ux">Admin</a></li>
                        {% endif %}
                        <li class="nav-item mt-2 mt-lg-0 ms-lg-1">
                            <a href="{% url 'account_logout' %}" class="btn btn-outline-secondary cta-btn-main">Esci</a>
                        </li>
                    {% else %}
                        <li class="nav-item"><a href="{% url 'account_login' %}" class="nav-link nav-link-ux">Accedi</a></li>
                        <li class="nav-item mt-2 mt-lg-0 ms-lg-1">
                            <a href="{% url 'account_signup' %}" class="btn btn-primary cta-btn-main">Registrati</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
</header>
