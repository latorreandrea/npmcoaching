{% extends "base.html" %}

{% block content %}
<section class="section section-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="insight-card auth-card text-center">
                    <p class="section-kicker">Account</p>
                    <h1 class="section-title auth-title">Vuoi uscire?</h1>
                    <p class="section-description auth-subtitle">Conferma il logout dal tuo account.</p>

                    <form method="post" action="{% url 'account_logout' %}" class="mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-primary action-btn w-100">Conferma logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
