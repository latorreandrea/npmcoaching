{% extends "base.html" %}

{% block content %}
<section class="section section-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="insight-card auth-card">
                    <p class="section-kicker">Account</p>
                    <h1 class="section-title auth-title">Recupera password</h1>
                    <p class="section-description auth-subtitle">Inserisci la tua email e ti invieremo un link per reimpostare la password.</p>

                    {% if form.non_field_errors %}
                        <div class="alert alert-danger" role="alert">{{ form.non_field_errors }}</div>
                    {% endif %}

                    <form method="post" action="{% url 'account_reset_password' %}" class="auth-form mt-4">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email</label>
                            <input type="email" name="email" id="id_email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary action-btn w-100">Invia link di reset</button>
                    </form>

                    <p class="mt-4 mb-0 text-center auth-link-row">
                        <a href="{% url 'account_login' %}">Torna al login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
