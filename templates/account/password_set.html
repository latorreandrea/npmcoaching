{% extends "base.html" %}

{% block content %}
<section class="section section-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="insight-card auth-card">
                    <p class="section-kicker">Account</p>
                    <h1 class="section-title auth-title">Imposta password</h1>
                    <p class="section-description auth-subtitle">Crea una password per il tuo account.</p>

                    {% if form.non_field_errors %}
                        <div class="alert alert-danger" role="alert">{{ form.non_field_errors }}</div>
                    {% endif %}

                    <form method="post" action="{% url 'account_set_password' %}" class="auth-form mt-4">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_password1" class="form-label">Nuova password</label>
                            <input type="password" name="password1" id="id_password1" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="id_password2" class="form-label">Conferma nuova password</label>
                            <input type="password" name="password2" id="id_password2" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary action-btn w-100">Salva password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
