{% extends "base.html" %}

{% block content %}
<section class="section section-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <p class="section-kicker">Account</p>
                <h1 class="section-title">Il tuo profilo</h1>
                <div class="insight-card mt-4">
                    <p><strong>Email:</strong> {{ request.user.email }}</p>
                    {% if request.user.is_superuser %}
                        <p><strong>Ruolo:</strong> Admin</p>
                    {% endif %}
                    <a href="{% url 'accounts:tests-list' %}" class="btn btn-primary action-btn mt-2">Vai ai test</a>
                    {% if request.user.is_superuser %}
                        <a href="{% url 'accounts:admin-dashboard' %}" class="btn btn-primary action-btn mt-2">Vai alla dashboard admin</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
